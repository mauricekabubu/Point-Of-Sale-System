<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashier Login — NexaPOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page:        #eef1f7;
    --bg-card:        #ffffff;
    --bg-card-inner:  #f5f7fb;
    --bg-key:         #ffffff;
    --bg-key-hover:   #f0f4ff;
    --bg-key-active:  #e4eaff;
    --bg-dot-empty:   #dde2ee;
    --bg-dot-filled:  #3a5bef;
    --accent:         #3a5bef;
    --accent-dark:    #2a47d6;
    --accent-glow:    rgba(58,91,239,0.18);
    --text-primary:   #0f172a;
    --text-secondary: #64748b;
    --text-muted:     #94a3b8;
    --text-key:       #1e293b;
    --border:         rgba(15,23,42,0.08);
    --border-key:     rgba(15,23,42,0.07);
    --shadow-card:    0 8px 48px rgba(15,23,42,0.10), 0 2px 12px rgba(15,23,42,0.06);
    --shadow-key:     0 2px 6px rgba(15,23,42,0.07);
    --shadow-key-hover: 0 4px 14px rgba(58,91,239,0.14);
    --radius-card:    20px;
    --radius-key:     14px;
    --radius-btn:     12px;
    --font: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
    --transition: 150ms cubic-bezier(0.4,0,0.2,1);
    --delete-bg:      #fff1f2;
    --delete-hover:   #ffe4e6;
    --delete-text:    #e11d48;
    --clear-bg:       #f8fafc;
    --clear-hover:    #f1f5f9;
    --clear-text:     #64748b;
  }

  [data-theme="dark"] {
    --bg-page:        #0c1120;
    --bg-card:        #151d2e;
    --bg-card-inner:  #1a2440;
    --bg-key:         #1e2d47;
    --bg-key-hover:   #263558;
    --bg-key-active:  #2e3f68;
    --bg-dot-empty:   #263558;
    --bg-dot-filled:  #5b79ff;
    --accent:         #5b79ff;
    --accent-dark:    #4a66f0;
    --accent-glow:    rgba(91,121,255,0.22);
    --text-primary:   #f1f5ff;
    --text-secondary: #8899bb;
    --text-muted:     #4a5a7a;
    --text-key:       #d4defc;
    --border:         rgba(255,255,255,0.07);
    --border-key:     rgba(255,255,255,0.06);
    --shadow-card:    0 8px 48px rgba(0,0,0,0.4), 0 2px 12px rgba(0,0,0,0.3);
    --shadow-key:     0 2px 6px rgba(0,0,0,0.3);
    --shadow-key-hover: 0 4px 14px rgba(91,121,255,0.2);
    --delete-bg:      #2a1a22;
    --delete-hover:   #3a1f2b;
    --delete-text:    #f87171;
    --clear-bg:       #1a2440;
    --clear-hover:    #1e2d47;
    --clear-text:     #8899bb;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg-page);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition);
    padding: 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(58,91,239,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(99,130,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  [data-theme="dark"] body::before {
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(58,91,239,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(91,121,255,0.08) 0%, transparent 70%);
  }

  .theme-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-key);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    color: var(--text-secondary);
  }
  .theme-btn:hover { background: var(--bg-key-hover); transform: scale(1.08); }
  .theme-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .sun-icon, .moon-icon { position: absolute; transition: opacity var(--transition), transform var(--transition); }
  [data-theme="light"] .sun-icon { opacity: 1; transform: rotate(0); }
  [data-theme="light"] .moon-icon { opacity: 0; transform: rotate(90deg); }
  [data-theme="dark"] .sun-icon { opacity: 0; transform: rotate(-90deg); }
  [data-theme="dark"] .moon-icon { opacity: 1; transform: rotate(0); }

  .login-card {
    position: relative;
    z-index: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 36px 32px 32px;
    width: 100%;
    max-width: 400px;
    transition: background var(--transition);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg { width: 18px; height: 18px; fill: #fff; }
  .brand-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .login-header { margin-bottom: 20px; }
  .lock-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-card-inner);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    margin-bottom: 12px;
  }
  .lock-badge svg { width: 12px; height: 12px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .lock-badge span {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .login-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* Employee ID field */
  .employee-field {
    margin-bottom: 18px;
  }
  .employee-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .employee-input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border-radius: var(--radius-btn);
    border: 1px solid var(--border-key);
    background: var(--bg-card-inner);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .employee-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .employee-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 24px 0;
  }
  .pin-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--bg-dot-empty);
    transition: background 200ms cubic-bezier(0.34,1.56,0.64,1), transform 200ms cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .pin-dot.filled {
    background: var(--bg-dot-filled);
    transform: scale(1.15);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }
  .pin-dot.pulse {
    animation: dotPulse 0.3s ease forwards;
  }
  @keyframes dotPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1.15); }
  }

  .pin-dots.shake {
    animation: shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97);
  }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(3px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .pin-dots.error .pin-dot.filled { background: #e11d48; box-shadow: 0 0 0 4px rgba(225,29,72,0.15); }

  .error-msg {
    text-align: center;
    font-size: 13px;
    color: #e11d48;
    font-weight: 500;
    margin-top: -12px;
    margin-bottom: 16px;
    min-height: 18px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 200ms, transform 200ms;
  }
  .error-msg.visible { opacity: 1; transform: translateY(0); }

  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .key {
    background: var(--bg-key);
    border: 1px solid var(--border-key);
    border-radius: var(--radius-key);
    box-shadow: var(--shadow-key);
    height: 64px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    user-select: none;
    transition: background var(--transition), box-shadow var(--transition), transform var(--transition), border-color var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .key:hover {
    background: var(--bg-key-hover);
    box-shadow: var(--shadow-key-hover);
    border-color: rgba(58,91,239,0.15);
  }
  .key:active, .key.pressed {
    background: var(--bg-key-active);
    transform: scale(0.94);
    box-shadow: none;
  }
  .key-num {
    font-size: 20px;
    font-weight: 500;
    color: var(--text-key);
    line-height: 1;
    font-family: var(--font);
    letter-spacing: -0.01em;
  }
  .key-alpha {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .key-delete {
    background: var(--delete-bg);
    border-color: transparent;
  }
  .key-delete:hover { background: var(--delete-hover); border-color: transparent; }
  .key-delete .key-num { font-size: 18px; color: var(--delete-text); }

  .key-clear {
    background: var(--clear-bg);
    border-color: transparent;
  }
  .key-clear:hover { background: var(--clear-hover); border-color: transparent; }
  .key-clear .key-num { font-size: 15px; font-weight: 600; color: var(--clear-text); letter-spacing: 0.01em; }

  .btn-login {
    width: 100%;
    height: 52px;
    border-radius: var(--radius-btn);
    background: var(--accent);
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.01em;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    box-shadow: 0 4px 16px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background var(--transition);
  }
  .btn-login:hover { background: var(--accent-dark); box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-1px); }
  .btn-login:active { transform: scale(0.98) translateY(0); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-login .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-login.loading .btn-label { display: none; }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius-card);
    background: var(--bg-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 400ms;
    z-index: 10;
  }
  .success-overlay.visible { opacity: 1; pointer-events: all; }
  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #ecfdf5;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  [data-theme="dark"] .success-icon { background: #052e1a; }
  .success-icon svg { width: 26px; height: 26px; stroke: #10b981; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .success-sub { font-size: 13px; color: var(--text-secondary); }

  .login-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
  }
  .footer-link {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .footer-link:hover { color: var(--accent); }

  @media (max-width: 420px) {
    .login-card { padding: 28px 20px 24px; }
    .key { height: 60px; }
    .key-num { font-size: 18px; }
  }
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">
  <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="login-card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v2H4zm0 4h10v2H4zm0 4h16v2H4zm0 4h10v2H4zM18 14l4 4-4 4v-3h-4v-2h4v-3z"/></svg>
    </div>
    <div>
      <div class="brand-name">CodexLabs POS</div>
      <div class="brand-tag">Point of Sale</div>
    </div>
  </div>

  <!-- Header -->
  <div class="login-header">
    <div class="lock-badge">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure cashier access</span>
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Enter your employee ID and PIN to continue</p>
  </div>

  <!-- Employee ID -->
  <div class="employee-field">
    <label for="cashierIdInput" class="employee-label">Employee ID</label>
    <input type="text" inputmode="numeric" id="cashierIdInput" class="employee-input" placeholder="e.g. 1024" autocomplete="off">
  </div>

  <!-- PIN dots -->
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" data-index="0"></div>
    <div class="pin-dot" data-index="1"></div>
    <div class="pin-dot" data-index="2"></div>
    <div class="pin-dot" data-index="3"></div>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg">Incorrect PIN — please try again</div>

  <!-- Keypad -->
  <div class="keypad" id="keypad">
    <button class="key" data-num="1"><span class="key-num">1</span></button>
    <button class="key" data-num="2"><span class="key-num">2</span><span class="key-alpha">ABC</span></button>
    <button class="key" data-num="3"><span class="key-num">3</span><span class="key-alpha">DEF</span></button>
    <button class="key" data-num="4"><span class="key-num">4</span><span class="key-alpha">GHI</span></button>
    <button class="key" data-num="5"><span class="key-num">5</span><span class="key-alpha">JKL</span></button>
    <button class="key" data-num="6"><span class="key-num">6</span><span class="key-alpha">MNO</span></button>
    <button class="key" data-num="7"><span class="key-num">7</span><span class="key-alpha">PQRS</span></button>
    <button class="key" data-num="8"><span class="key-num">8</span><span class="key-alpha">TUV</span></button>
    <button class="key" data-num="9"><span class="key-num">9</span><span class="key-alpha">WXYZ</span></button>
    <button class="key key-delete" id="deleteKey"><span class="key-num">⌫</span></button>
    <button class="key" data-num="0"><span class="key-num">0</span></button>
    <button class="key key-clear" id="clearKey"><span class="key-num">CLR</span></button>
  </div>

  <!-- Login button -->
  <button class="btn-login" id="loginBtn">
    <span class="btn-label">Unlock Register</span>
    <div class="spinner"></div>
  </button>

  <!-- Footer -->
  <div class="login-footer">
    <button class="footer-link" id="forgotPinBtn">Forgot PIN?</button>
    <button class="footer-link" id="switchUserBtn">Switch user</button>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-text">Access granted</div>
    <div class="success-sub">Opening register…</div>
  </div>

</div>

<script>
  // ---------------------------------------------------------------------
  // Backend connection
  // ---------------------------------------------------------------------
  // Point this at wherever your Flask app is actually running. Leave it as
  // an empty string if this page is served BY the same Flask app/origin
  // (no host needed, just the path below).
  const API_BASE_URL = "https://pos-backend-system.up.railway.app";

  // Matches: app.register_blueprint(auth_bp, url_prefix="/auth/auth")
  //          @auth_bp.route("/cashier/login", methods=["POST"])
  const LOGIN_ENDPOINT = `${API_BASE_URL}/auth/auth/cashier/login`;

  const html = document.documentElement;
  let pin = '';
  let locked = false;

  const dots = document.querySelectorAll('.pin-dot');
  const pinDotsEl = document.getElementById('pinDots');
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  const successOverlay = document.getElementById('successOverlay');
  const cashierIdInput = document.getElementById('cashierIdInput');

  // Theme toggle
  document.getElementById('themeBtn').addEventListener('click', () => {
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  });

  // Update dots display
  function updateDots() {
    dots.forEach((dot, i) => {
      const wasFilled = dot.classList.contains('filled');
      const shouldFill = i < pin.length;
      dot.classList.toggle('filled', shouldFill);
      if (shouldFill && !wasFilled) {
        dot.classList.add('pulse');
        setTimeout(() => dot.classList.remove('pulse'), 350);
      }
    });
  }

  function clearError() {
    errorMsg.classList.remove('visible');
    pinDotsEl.classList.remove('shake', 'error');
  }

  function appendDigit(num) {
    if (locked || pin.length >= 4) return;
    clearError();
    pin += num;
    updateDots();
    if (pin.length === 4) {
      setTimeout(submitPin, 250);
    }
  }

  function deleteDigit() {
    if (locked) return;
    clearError();
    pin = pin.slice(0, -1);
    updateDots();
  }

  function clearPin() {
    if (locked) return;
    clearError();
    pin = '';
    updateDots();
  }

  function showError(message) {
    pinDotsEl.classList.add('shake', 'error');
    errorMsg.textContent = message;
    errorMsg.classList.add('visible');
    setTimeout(() => {
      pin = '';
      updateDots();
      pinDotsEl.classList.remove('shake', 'error');
      loginBtn.disabled = false;
      locked = false;
    }, 600);
  }

  // ---------------------------------------------------------------------
  // Submit: calls the real /auth/auth/cashier/login endpoint
  // ---------------------------------------------------------------------
  async function submitPin() {
    const cashierId = cashierIdInput.value.trim();

    if (!cashierId) {
      errorMsg.textContent = 'Enter your employee ID first';
      errorMsg.classList.add('visible');
      cashierIdInput.focus();
      return;
    }
    if (pin.length < 4) {
      errorMsg.textContent = 'Please enter all 4 digits';
      errorMsg.classList.add('visible');
      return;
    }

    clearError();
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;
    locked = true;

    try {
      const response = await fetch(LOGIN_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: cashierId, pin })
      });

      const data = await response.json().catch(() => ({}));
      loginBtn.classList.remove('loading');

      if (response.ok && data.access_token) {
        try {
          localStorage.setItem('nexapos_access_token', data.access_token);
          localStorage.setItem('nexapos_refresh_token', data.refresh_token);
          localStorage.setItem('nexapos_cashier', JSON.stringify(data.cashier));
        } catch (err) {
          console.warn("Storage error:", err);
        }

        successOverlay.classList.add('visible');

        setTimeout(() => {
          window.location.href = 'cashiers/cashier_dash.html';
        }, 1200);
      } else {
        // Backend returns { "error": "..." } for 400 / 401 / 404
        const message = data.error || 'Invalid employee ID or PIN';
        showError(message);
      }
    } catch (networkErr) {
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      locked = false;
      errorMsg.textContent = 'Could not reach the server — check your connection';
      errorMsg.classList.add('visible');
      pinDotsEl.classList.add('shake', 'error');
      setTimeout(() => pinDotsEl.classList.remove('shake', 'error'), 450);
    }
  }

  // Keypad events
  document.getElementById('keypad').addEventListener('click', (e) => {
    const key = e.target.closest('.key');
    if (!key) return;

    key.classList.add('pressed');
    setTimeout(() => key.classList.remove('pressed'), 120);

    if (key.dataset.num !== undefined) {
      appendDigit(key.dataset.num);
    }
  });

  document.getElementById('deleteKey').addEventListener('click', deleteDigit);
  document.getElementById('clearKey').addEventListener('click', clearPin);
  document.getElementById('loginBtn').addEventListener('click', submitPin);

  document.getElementById('switchUserBtn').addEventListener('click', () => {
    cashierIdInput.value = '';
    clearPin();
    cashierIdInput.focus();
  });

  // Physical keyboard support — ignore digits while typing in the ID field
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === cashierIdInput) {
      if (e.key === 'Enter') submitPin();
      return;
    }
    if (e.key >= '0' && e.key <= '9') appendDigit(e.key);
    else if (e.key === 'Backspace') deleteDigit();
    else if (e.key === 'Escape') clearPin();
    else if (e.key === 'Enter') submitPin();
  });
</script>
</body>
</html>
