services:
  db:
    image: mysql:8.0
    container_name: pos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_net
    # Do NOT expose 3306 publicly in production; uncomment only for local debugging
    # ports:
    #   - "3306:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped

    env_file:
    - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pos_net
    # Backend is not exposed to the host; nginx proxies to it internally

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pos_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pos_net

networks:
  pos_net:
    driver: bridge

volumes:
  db_data: